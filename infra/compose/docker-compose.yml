services:
  librechat:
    container_name: librechat
    image: ghcr.io/danny-avila/librechat:chart-1.9.7
    restart: unless-stopped
    ports:
      - "3080:3080"
    depends_on:
      - mongodb
      - meilisearch
      - vectordb
      - rag_api
      - ollama
      - pokemon-mcp
    environment:
      HOST: 0.0.0.0
      PORT: 3080
      MONGO_URI: mongodb://mongodb:27017/librechat
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: meili_master_key_change_me
      RAG_PORT: 8000
      RAG_API_URL: http://rag_api:8000
      CONFIG_PATH: /app/librechat.yaml
      ALLOW_REGISTRATION: "true"
      ALLOW_SOCIAL_LOGIN: "false"
      OPENAI_API_KEY: dummy
    volumes:
      - ../../apps/librechat/librechat.yaml:/app/librechat.yaml:ro
      - ../../apps/librechat/.env:/app/.env:ro
      - librechat-images:/app/client/public/images
      - librechat-uploads:/app/uploads
      - librechat-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mongodb:
    container_name: librechat-mongodb
    image: mongo:8.0.17
    restart: unless-stopped
    command: mongod --noauth
    volumes:
      - mongodb-data:/data/db

  meilisearch:
    container_name: librechat-meilisearch
    image: getmeili/meilisearch:v1.35.1
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: meili_master_key_change_me
    volumes:
      - meili-data:/meili_data

  vectordb:
    container_name: librechat-vectordb
    image: pgvector/pgvector:0.8.0-pg15-trixie
    restart: unless-stopped
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - pgdata:/var/lib/postgresql/data

  rag_api:
    container_name: librechat-rag-api
    image: ghcr.io/danny-avila/librechat-rag-api-dev-lite:v0.7.2
    restart: unless-stopped
    depends_on:
      - vectordb
    environment:
      DB_HOST: vectordb
      RAG_PORT: 8000

  ollama:
    container_name: ollama
    image: ollama/ollama:0.18.1
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  pokemon-mcp:
    container_name: pokemon-mcp
    build:
      context: ../../apps/mcp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    expose:
      - "8000"

volumes:
  mongodb-data:
  meili-data:
  pgdata:
  librechat-images:
  librechat-uploads:
  librechat-logs:
  ollama-data: